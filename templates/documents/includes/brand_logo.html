{% if variant == "compact" %}
<div class="inline-flex items-center gap-2">
  <span class="relative inline-flex h-6 w-6 items-center justify-center rounded-md border border-primary/35 bg-primary/10">
    <span class="font-headline-md text-[11px] font-semibold tracking-wide text-primary">A</span>
    <span class="pointer-events-none absolute inset-0 rounded-md ring-1 ring-primary/20"></span>
  </span>
  <div>
    <p class="bg-gradient-to-r from-primary via-indigo-300 to-sky-300 bg-clip-text font-headline-md text-[11px] font-semibold tracking-[0.14em] text-transparent">
      AETHER
    </p>
  </div>
</div>
{% else %}
<div class="inline-flex items-center gap-2.5">
  <span class="relative inline-flex h-7 w-7 items-center justify-center rounded-lg border border-primary/35 bg-primary/10">
    <span class="font-headline-md text-sm font-semibold tracking-wide text-primary">A</span>
    <span class="pointer-events-none absolute inset-0 rounded-lg ring-1 ring-primary/20"></span>
  </span>
  <div>
    <p class="bg-gradient-to-r from-primary via-indigo-300 to-sky-300 bg-clip-text font-headline-md text-base font-semibold tracking-[0.16em] text-transparent">
      AETHER
    </p>
    <p class="mt-0.5 font-label-sm text-[10px] uppercase tracking-[0.14em] text-on-surface-variant">Extraction Engine</p>
  </div>
</div>
{% endif %}
